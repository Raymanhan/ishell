name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rustTargets: x86_64-pc-windows-msvc
            artifact: ishell-windows-x64
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rustTargets: x86_64-unknown-linux-gnu
            artifact: ishell-linux-x64
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            rustTargets: x86_64-apple-darwin
            artifact: ishell-macos-intel
          - label: macOS Arm
            os: macos-latest
            target: aarch64-apple-darwin
            rustTargets: aarch64-apple-darwin
            artifact: ishell-macos-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Check Rust formatting
        if: runner.os == 'Linux'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Lint Rust backends
        if: runner.os == 'Linux'
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --features force-russh -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Test Windows SSH backend on Linux
        if: runner.os == 'Linux'
        run: cargo test --manifest-path src-tauri/Cargo.toml --features force-russh

      - name: Build installer
        if: runner.os != 'macOS'
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles app

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            ARCH_SUFFIX="aarch64"
          else
            ARCH_SUFFIX="x64"
          fi

          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/iShell.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          DMG_PATH="${DMG_DIR}/iShell_${VERSION}_${ARCH_SUFFIX}.dmg"

          test -d "${APP_PATH}"
          mkdir -p "${DMG_DIR}"
          hdiutil create -volname "iShell" -srcfolder "${APP_PATH}" -ov -format UDZO "${DMG_PATH}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
