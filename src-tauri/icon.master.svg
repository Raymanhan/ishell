<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="200" y1="160" x2="824" y2="864" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b3a6b"/>
      <stop offset="0.5" stop-color="#1b2347"/>
      <stop offset="1" stop-color="#0d1226"/>
    </linearGradient>
    <linearGradient id="gloss" x1="512" y1="100" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glyph" x1="360" y1="400" x2="680" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfe0ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#03060f" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Inset the visible shape so its Dock size matches neighboring terminal-style icons. -->
  <rect x="110" y="110" width="804" height="804" rx="178" fill="url(#bg)"/>
  <rect x="110" y="110" width="804" height="804" rx="178" fill="url(#gloss)"/>
  <!-- prompt glyph, scaled with the inset shape -->
  <g filter="url(#soft)" transform="translate(512 512) scale(0.625) translate(-512 -512)">
    <path d="M336 392 L508 512 L336 632" fill="none" stroke="url(#glyph)" stroke-width="86" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M560 636 H720" fill="none" stroke="url(#glyph)" stroke-width="86" stroke-linecap="round"/>
  </g>
</svg>
